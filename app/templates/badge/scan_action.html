<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbratura Mobile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .action-btn { width: 100%; padding: 2rem; font-size: 1.5rem; border-radius: 15px; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="container text-center px-4">
        <h2 class="mb-5">Registra Timbratura</h2>
        <form method="POST" action="{{ url_for('badge.record') }}">
            <input type="hidden" name="token" value="{{ token }}">
            
            <button type="submit" name="action" value="IN" class="btn btn-success action-btn shadow-sm">
                <i class="bi bi-box-arrow-in-right d-block mb-2" style="font-size: 3rem;"></i>
                ENTRATA
            </button>
            
            <button type="submit" name="action" value="OUT" class="btn btn-danger action-btn shadow-sm mt-4">
                <i class="bi bi-box-arrow-left d-block mb-2" style="font-size: 3rem;"></i>
                USCITA
            </button>
        </form>
    </div>
</body>
</html>
